[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
addopts = -v --tb=short --strict-markers
markers =
    integration: requires real Alteegio/OpenAI/Sheets access
    slow: takes more than 1 second
